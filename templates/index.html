<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BioKey — Iris Authentication</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: #0a0a0a;
      color: #ffffff;
      font-family: 'SF Mono', 'Fira Code', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    h1 {
      font-size: 2rem;
      letter-spacing: 0.1em;
      margin-bottom: 4px;
    }

    .subtitle {
      color: #666;
      font-size: 0.85rem;
      margin-bottom: 32px;
      letter-spacing: 0.05em;
    }

    .camera-container {
      position: relative;
      width: 480px;
      height: 360px;
      border: 1px solid #222;
      border-radius: 8px;
      overflow: hidden;
      background: #111;
    }

    #video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }

    #canvas { display: none; }

    .overlay {
      position: absolute;
      top: 16px;
      left: 16px;
      font-size: 0.75rem;
      color: #00ff88;
      letter-spacing: 0.05em;
    }

    .status-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #00ff88;
      margin-right: 6px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .controls {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }

    .btn {
      padding: 12px 28px;
      border: none;
      border-radius: 6px;
      font-family: inherit;
      font-size: 0.9rem;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-enroll {
      background: #1a1a1a;
      color: #ffffff;
      border: 1px solid #333;
    }

    .btn-enroll:hover { border-color: #666; }

    .btn-verify {
      background: #00ff88;
      color: #000000;
      font-weight: 600;
    }

    .btn-verify:hover { background: #00cc6a; }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .result {
      margin-top: 24px;
      padding: 16px 24px;
      border-radius: 6px;
      font-size: 0.9rem;
      letter-spacing: 0.05em;
      min-width: 480px;
      text-align: center;
      display: none;
    }

    .result.granted {
      background: #0a2a1a;
      border: 1px solid #00ff88;
      color: #00ff88;
    }

    .result.denied {
      background: #2a0a0a;
      border: 1px solid #ff4444;
      color: #ff4444;
    }

    .result.error {
      background: #1a1a0a;
      border: 1px solid #ffaa00;
      color: #ffaa00;
    }

    .enroll-form {
      display: none;
      margin-top: 16px;
      gap: 8px;
      align-items: center;
    }

    .enroll-form.visible { display: flex; }

    .enroll-input {
      padding: 10px 16px;
      background: #111;
      border: 1px solid #333;
      border-radius: 6px;
      color: #fff;
      font-family: inherit;
      font-size: 0.9rem;
      outline: none;
    }

    .enroll-input:focus { border-color: #666; }

    .btn-confirm {
      padding: 10px 20px;
      background: #ffffff;
      color: #000000;
      border: none;
      border-radius: 6px;
      font-family: inherit;
      font-size: 0.9rem;
      cursor: pointer;
      font-weight: 600;
    }

    .distance {
      font-size: 0.75rem;
      opacity: 0.6;
      margin-top: 4px;
    }

    footer {
      margin-top: 48px;
      color: #333;
      font-size: 0.75rem;
      text-align: center;
      line-height: 1.8;
    }

    footer a { color: #555; text-decoration: none; }
    footer a:hover { color: #888; }
  </style>
</head>
<body>

  <h1>🔑 BioKey</h1>
  <p class="subtitle">iris-based biometric authentication</p>

  <div class="camera-container">
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>
    <div class="overlay">
      <span class="status-dot"></span>LIVE
    </div>
  </div>

  <div class="controls">
    <button class="btn btn-enroll" id="enrollBtn" onclick="showEnrollForm()">
      Enroll
    </button>
    <button class="btn btn-verify" id="verifyBtn" onclick="verify()">
      Verify →
    </button>
  </div>

  <div class="enroll-form" id="enrollForm">
    <input class="enroll-input" id="nameInput" 
           placeholder="enter your name" type="text">
    <button class="btn-confirm" onclick="enroll()">Capture</button>
  </div>

  <div class="result" id="result">
    <div id="resultText"></div>
    <div class="distance" id="resultDistance"></div>
  </div>

  <footer>
    built by <a href="https://github.com/skeshri23">shristi keshri</a>
    &nbsp;·&nbsp;
    <a href="https://github.com/skeshri23/iris-recognition">github</a>
    &nbsp;·&nbsp;
    <a href="/health">api status</a>
  </footer>

  <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    // Start webcam
    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ 
          video: { facingMode: 'user' } 
        });
        video.srcObject = stream;
      } catch (err) {
        showResult('error', 'Camera access denied — please allow camera permission');
      }
    }

    // Capture current frame as base64
    function captureFrame() {
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0);
      return canvas.toDataURL('image/jpeg', 0.8);
    }

    function showEnrollForm() {
      const form = document.getElementById('enrollForm');
      form.classList.toggle('visible');
    }

    function showResult(type, message, distance) {
      const result = document.getElementById('result');
      const resultText = document.getElementById('resultText');
      const resultDistance = document.getElementById('resultDistance');

      result.className = `result ${type}`;
      result.style.display = 'block';
      resultText.textContent = message;
      resultDistance.textContent = distance ? 
        `distance: ${distance}` : '';
    }

    async function enroll() {
      const name = document.getElementById('nameInput').value.trim();
      if (!name) {
        showResult('error', 'Please enter your name');
        return;
      }

      const frame = captureFrame();

      try {
        const response = await fetch('/enroll_base64', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, image: frame })
        });
        const data = await response.json();

        if (data.message) {
          showResult('granted', `✓ ${data.message}`);
          document.getElementById('enrollForm').classList.remove('visible');
        } else {
          showResult('error', `✗ ${data.error}`);
        }
      } catch (err) {
        showResult('error', 'Connection error');
      }
    }

    async function verify() {
      const frame = captureFrame();

      try {
        const response = await fetch('/verify_base64', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ image: frame })
        });
        const data = await response.json();

        if (data.access === 'granted') {
          showResult('granted', 
            `✓ Welcome, ${data.identity}`, 
            data.distance);
        } else if (data.access === 'denied') {
          showResult('denied', '✗ Access Denied', data.distance);
        } else {
          showResult('error', `✗ ${data.error}`);
        }
      } catch (err) {
        showResult('error', 'Connection error');
      }
    }

    startCamera();
  </script>

</body>
</html>
